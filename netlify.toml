[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Headers de seguridad ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Fuerza HTTPS por 1 año, incluyendo subdominios
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Evita que el navegador adivine el tipo de contenido (previene ataques MIME)
    X-Content-Type-Options = "nosniff"

    # Bloquea que la app se incruste en iframes de otros sitios (anti-clickjacking)
    X-Frame-Options = "DENY"

    # Activa el filtro XSS del navegador (compatibilidad legacy)
    X-XSS-Protection = "1; mode=block"

    # No expone la URL de referencia fuera del sitio
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restringe acceso a APIs del navegador solo a lo necesario
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), notifications=(self)"

    # Content Security Policy: fuentes permitidas por recurso
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://*.googleapis.com
        https://*.gstatic.com
        https://maps.googleapis.com
        https://maps.gstatic.com;
      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com
        https://*.gstatic.com;
      font-src 'self'
        https://fonts.gstatic.com;
      img-src 'self' data: blob:
        https://*.googleapis.com
        https://*.gstatic.com
        https://maps.gstatic.com
        https://*.openstreetmap.org;
      connect-src 'self'
        https://*.googleapis.com
        https://*.firebaseio.com
        https://firestore.googleapis.com
        https://identitytoolkit.googleapis.com
        https://securetoken.googleapis.com
        https://firebase.googleapis.com
        https://api.open-meteo.com
        wss://*.firebaseio.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """
