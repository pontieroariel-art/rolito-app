name: CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install app deps
        run: npm ci

      - name: Typecheck (app)
        run: npm run typecheck

      - name: Lint (src)
        run: npm run lint

      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Typecheck (functions)
        run: npm run typecheck:functions

  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      # Los runners ubuntu ya traen Java, que el emulador de Firestore necesita.
      - name: Tests de reglas Firestore (emulador)
        run: npm run test:rules
